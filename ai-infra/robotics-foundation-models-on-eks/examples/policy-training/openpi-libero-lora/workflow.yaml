workflow:
  name: aws-openpi-libero-lora
  timeout:
    exec_timeout: 4h
    queue_timeout: 6h
  resources:
    default:
      cpu: 8
      gpu: 1
      memory: 64Gi
      storage: 512Gi
      platform: g7e-rtx-pro-6000

  tasks:
  - name: openpi-libero-lora
    image: {{ image_name }}
    command: ["bash", "-lc"]
    args:
    - bash /tmp/entry.sh
    credentials:
      huggingface_token:
        HF_TOKEN: token
    files:
    - path: /tmp/entry.sh
      contents: |
        set -euo pipefail
        START_TS="$(date -u +%s)"

        unset PIP_CONSTRAINT XLA_FLAGS
        export PIP_CONSTRAINT=
        export DEBIAN_FRONTEND=noninteractive
        export HF_HOME=/tmp/hf-home
        export HF_TOKEN="${HF_TOKEN:-}"
        export HUGGING_FACE_HUB_TOKEN="${HF_TOKEN:-}"
        export OPENPI_DATA_HOME=/tmp/openpi-cache
        export PYTHONUNBUFFERED=1
        export UV_LINK_MODE=copy
        export UV_PROJECT_ENVIRONMENT=/tmp/openpi-venv
        export XLA_PYTHON_CLIENT_MEM_FRACTION="{{ xla_memory_fraction }}"

        test -n "${HF_TOKEN:-}"
        nvidia-smi
        python --version

        GPU_METRICS_DIR=/tmp/gpu-metrics
        GPU_METRICS_CSV="${GPU_METRICS_DIR}/nvidia-smi.csv"
        mkdir -p "${GPU_METRICS_DIR}"
        (
          set +e
          while true; do
            nvidia-smi \
              --query-gpu=timestamp,index,name,utilization.gpu,utilization.memory,memory.used,memory.total,power.draw,temperature.gpu \
              --format=csv,noheader,nounits >>"${GPU_METRICS_CSV}" 2>/dev/null || true
            sleep "{{ gpu_metrics_interval_seconds }}"
          done
        ) &
        GPU_METRICS_PID="$!"
        stop_gpu_metrics() {
          if [[ -n "${GPU_METRICS_PID:-}" ]]; then
            kill "${GPU_METRICS_PID}" >/dev/null 2>&1 || true
            wait "${GPU_METRICS_PID}" >/dev/null 2>&1 || true
            GPU_METRICS_PID=""
          fi
        }
        trap 'stop_gpu_metrics' EXIT

        apt-get update >/dev/null
        apt-get install -y --no-install-recommends \
          build-essential ca-certificates clang curl git git-lfs \
          libgl1 libglib2.0-0 >/dev/null
        curl -LsSf https://astral.sh/uv/install.sh | sh >/dev/null
        export PATH="${HOME}/.local/bin:${PATH}"

        git clone --depth 1 "{{ openpi_repository }}" /tmp/openpi
        cd /tmp/openpi
        git fetch --depth 1 origin "{{ openpi_ref }}"
        git checkout "{{ openpi_ref }}"
        export PYTHONPATH=/tmp/openpi:/tmp/openpi/src

        GIT_LFS_SKIP_SMUDGE=1 uv sync --frozen --no-dev
        mkdir -p "${OPENPI_DATA_HOME}" /tmp/openpi-output

        cat > /tmp/openpi_compute_norm_stats_bounded.py <<'PY'
        import numpy as np
        import tqdm

        from lerobot.common.datasets import lerobot_dataset
        import openpi.shared.normalize as normalize
        from openpi.training import config as _config
        from openpi.training import data_loader as _data_loader
        import openpi.transforms as transforms

        DATASET_EPISODES = [int(ep) for ep in "{{ dataset_episodes }}".split(",") if ep]

        class RemoveStrings(transforms.DataTransformFn):
            def __call__(self, x: dict) -> dict:
                return {k: v for k, v in x.items() if not np.issubdtype(np.asarray(v).dtype, np.str_)}


        def create_libero_episode_dataset(data_config, action_horizon, model_config):
            dataset_meta = lerobot_dataset.LeRobotDatasetMetadata(data_config.repo_id)
            dataset = lerobot_dataset.LeRobotDataset(
                data_config.repo_id,
                episodes=DATASET_EPISODES,
                delta_timestamps={
                    key: [t / dataset_meta.fps for t in range(action_horizon)]
                    for key in data_config.action_sequence_keys
                },
                download_videos=False,
            )
            if data_config.prompt_from_task:
                dataset = _data_loader.TransformedDataset(
                    dataset,
                    [transforms.PromptFromLeRobotTask(dataset_meta.tasks)],
                )
            return dataset


        def main():
            train_config = _config.get_config("{{ config_name }}")
            data_config = train_config.data.create(train_config.assets_dirs, train_config.model)
            if data_config.repo_id != "physical-intelligence/libero":
                raise ValueError(f"Expected physical-intelligence/libero, got {data_config.repo_id}")
            print(f"Using LIBERO episodes: {DATASET_EPISODES}")

            dataset = create_libero_episode_dataset(
                data_config,
                train_config.model.action_horizon,
                train_config.model,
            )
            dataset = _data_loader.TransformedDataset(
                dataset,
                [
                    *data_config.repack_transforms.inputs,
                    *data_config.data_transforms.inputs,
                    RemoveStrings(),
                ],
            )
            num_batches = max(1, ({{ norm_stats_max_frames }} + {{ batch_size }} - 1) // {{ batch_size }})
            loader = _data_loader.TorchDataLoader(
                dataset,
                local_batch_size={{ batch_size }},
                num_workers=0,
                shuffle=False,
                num_batches=num_batches,
            )

            keys = ["state", "actions"]
            stats = {key: normalize.RunningStats() for key in keys}
            for batch in tqdm.tqdm(loader, total=num_batches, desc="Computing bounded stats"):
                for key in keys:
                    stats[key].update(np.asarray(batch[key]))

            norm_stats = {key: stats.get_statistics() for key, stats in stats.items()}
            output_path = train_config.assets_dirs / data_config.repo_id
            print(f"Writing bounded stats to: {output_path}")
            normalize.save(output_path, norm_stats)


        if __name__ == "__main__":
            main()
        PY
        uv run --no-dev python /tmp/openpi_compute_norm_stats_bounded.py

        cat > /tmp/openpi_train_libero_lora.py <<'PY'
        import dataclasses
        from pathlib import Path
        import jax
        from lerobot.common.datasets import lerobot_dataset
        from openpi.training import config as _config
        from openpi.training import data_loader as _data_loader
        import openpi.transforms as _transforms
        from scripts import train

        DATASET_EPISODES = [int(ep) for ep in "{{ dataset_episodes }}".split(",") if ep]

        def create_libero_episode_dataset(data_config, action_horizon, model_config):
            dataset_meta = lerobot_dataset.LeRobotDatasetMetadata(data_config.repo_id)
            dataset = lerobot_dataset.LeRobotDataset(
                data_config.repo_id,
                episodes=DATASET_EPISODES,
                delta_timestamps={
                    key: [t / dataset_meta.fps for t in range(action_horizon)]
                    for key in data_config.action_sequence_keys
                },
                download_videos=False,
            )
            if data_config.prompt_from_task:
                dataset = _data_loader.TransformedDataset(
                    dataset,
                    [_transforms.PromptFromLeRobotTask(dataset_meta.tasks)],
                )
            return dataset

        def main():
            print("jax devices:", jax.devices())
            print(f"Using LIBERO episodes: {DATASET_EPISODES}")
            cfg = dataclasses.replace(
                _config._CONFIGS_DICT["{{ config_name }}"],
                batch_size={{ batch_size }},
                checkpoint_base_dir="/tmp/openpi-output/checkpoints",
                exp_name="{{ experiment_name }}",
                overwrite=True,
                resume=False,
                num_train_steps={{ num_train_steps }},
                log_interval=1,
                save_interval={{ save_interval }},
                num_workers=0,
                wandb_enabled=False,
            )

            original_create_data_loader = _data_loader.create_data_loader

            def create_deterministic_data_loader(config, *args, **kwargs):
                kwargs["shuffle"] = False
                return original_create_data_loader(config, *args, **kwargs)

            _data_loader.create_data_loader = create_deterministic_data_loader
            train._data_loader.create_data_loader = create_deterministic_data_loader
            _data_loader.create_torch_dataset = create_libero_episode_dataset
            train._data_loader.create_torch_dataset = create_libero_episode_dataset
            train.main(cfg)
            for path in sorted(Path("/tmp/openpi-output").glob("**/*")):
                if path.is_file():
                    print(path)

        if __name__ == "__main__":
            main()
        PY
        uv run --no-dev python /tmp/openpi_train_libero_lora.py

        if [[ "{{ retain_checkpoint_arrays }}" != "true" ]]; then
          find /tmp/openpi-output -type d \( -name d -o -name ocdbt.process_0 \) -prune -exec rm -rf {} +
        fi

        stop_gpu_metrics
        python /tmp/gpu_metrics_summary.py "${GPU_METRICS_CSV}" "${GPU_METRICS_DIR}" || true

        mkdir -p "{{output}}/artifacts/checkpoints" "{{output}}/artifacts/assets"
        cp -a /tmp/openpi-output/. "{{output}}/artifacts/"
        cp -a /tmp/openpi/assets/. "{{output}}/artifacts/assets/"
        cp -a "${GPU_METRICS_DIR}" "{{output}}/artifacts/gpu-metrics"
        END_TS="$(date -u +%s)"
        cat > "{{output}}/artifacts/run-manifest.json" <<JSON
        {
          "workflow": "aws-openpi-libero-lora",
          "repository": "{{ openpi_repository }}",
          "ref": "{{ openpi_ref }}",
          "image": "{{ image_name }}",
          "config_name": "{{ config_name }}",
          "dataset_repo_id": "physical-intelligence/libero",
          "dataset_episodes": "{{ dataset_episodes }}",
          "norm_stats_max_frames": {{ norm_stats_max_frames }},
          "num_train_steps": {{ num_train_steps }},
          "batch_size": {{ batch_size }},
          "gpu_metrics_interval_seconds": {{ gpu_metrics_interval_seconds }},
          "runtime_seconds": $((END_TS - START_TS)),
          "retain_checkpoint_arrays": "{{ retain_checkpoint_arrays }}"
        }
        JSON
        find "{{output}}/artifacts" -maxdepth 6 -type f | sort | head -200
        exit 0
    - path: /tmp/gpu_metrics_summary.py
      contents: |
        import csv
        import json
        import math
        import statistics
        import sys
        from pathlib import Path

        csv_path = Path(sys.argv[1])
        out_dir = Path(sys.argv[2])
        out_dir.mkdir(parents=True, exist_ok=True)

        fields = [
            "timestamp",
            "index",
            "name",
            "gpu_util_percent",
            "memory_util_percent",
            "memory_used_mib",
            "memory_total_mib",
            "power_draw_w",
            "temperature_c",
        ]

        rows = []
        if csv_path.exists():
            with csv_path.open(newline="") as f:
                for row in csv.reader(f):
                    if len(row) != len(fields):
                        continue
                    item = {key: value.strip() for key, value in zip(fields, row)}
                    for key in fields[3:]:
                        try:
                            item[key] = float(item[key])
                        except ValueError:
                            item[key] = math.nan
                    rows.append(item)

        def values(key):
            return [float(row[key]) for row in rows if not math.isnan(float(row[key]))]

        summary = {
            "sample_count": len(rows),
            "gpu_name": rows[0]["name"] if rows else None,
            "gpu_util_percent_avg": statistics.fmean(values("gpu_util_percent")) if values("gpu_util_percent") else None,
            "gpu_util_percent_max": max(values("gpu_util_percent")) if values("gpu_util_percent") else None,
            "memory_used_mib_avg": statistics.fmean(values("memory_used_mib")) if values("memory_used_mib") else None,
            "memory_used_mib_max": max(values("memory_used_mib")) if values("memory_used_mib") else None,
            "power_draw_w_avg": statistics.fmean(values("power_draw_w")) if values("power_draw_w") else None,
            "power_draw_w_max": max(values("power_draw_w")) if values("power_draw_w") else None,
        }
        (out_dir / "gpu-metrics-summary.json").write_text(json.dumps(summary, indent=2) + "\n")
    outputs:
    - dataset:
        name: {{ output_dataset }}
        path: artifacts

default-values:
  image_name: "nvcr.io/nvidia/pytorch:25.03-py3"
  openpi_repository: "https://github.com/Physical-Intelligence/openpi"
  openpi_ref: "650c5b0283a49c42784fb5055a0507da2c6d347d"
  config_name: pi0_libero_low_mem_finetune
  experiment_name: aws-osmo-libero-lora
  output_dataset: openpi-libero-lora-artifacts
  dataset_episodes: "0"
  norm_stats_max_frames: 4
  num_train_steps: 2
  save_interval: 2
  batch_size: 1
  xla_memory_fraction: 0.7
  retain_checkpoint_arrays: "false"
  gpu_metrics_interval_seconds: 10
